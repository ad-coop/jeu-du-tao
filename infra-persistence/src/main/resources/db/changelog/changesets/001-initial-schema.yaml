databaseChangeLog:
  - changeSet:
      id: 001-initial-schema
      author: initial
      changes:
        - createTable:
            tableName: games
            columns:
              - column:
                  name: handle
                  type: VARCHAR(6)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: password_hash
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: state
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: guardian_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
              - column:
                  name: guardian_name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: magic_link_token
                  type: VARCHAR(255)
              - column:
                  name: magic_link_expiry
                  type: TIMESTAMP
              - column:
                  name: email
                  type: VARCHAR(255)
        - createTable:
            tableName: players
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: game_handle
                  type: VARCHAR(6)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_players_game
                    references: games(handle)
      rollback:
        - dropTable:
            tableName: players
        - dropTable:
            tableName: games
